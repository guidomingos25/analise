:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --card2:#f8fafc;
  --backcard:#ffffff;
  --text:#0f172a;
  --muted:#475569;
  --border:#d1d5db;
  --accent:#1e40af;
  --accent2:#166534;
  --danger:#b91c1c;
  --warning:#b45309;
  --bgcard:#e5e7eb;
}

*{ box-sizing:border-box; font-family: system-ui, Segoe UI, Roboto, Arial; }

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  padding:24px;
}

.container{ max-width:1400px; margin:auto; }

h1{
  font-size:22px;
  font-weight:700;
  color:#0f172a;
}

.groupHeader b{
  font-size:14px;
}

.sub{ color:var(--muted); font-size:13px; }

.grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card h2{ font-size:14px; margin-bottom:10px; }

input[type="file"], .search, select{
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  width:100%;
}

.btn{
  cursor:pointer;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--accent);
  color:#fff;
  padding:10px 16px;
  font-weight:700;
}

.btn.secondary{
  background:#f9fafb;
  color:#111827;
}

.btn.green{
  background:var(--accent2);
}

.btn:disabled{ opacity:.5; }

.status{ font-size:12px; color:var(--muted); }

.toolbar{
  display:flex;
  gap:10px;
  justify-content:space-between;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.left{ display:flex; gap:10px; align-items:center; }

.summary{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }

.pill{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:999px;
  padding:6px 12px;
  font-size:12px;
}

.results{ display:flex; flex-direction:column; gap:14px; }

.group{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}

.groupHeader{
  padding:12px 16px;
  background:#e5e7eb;
  border-bottom:2px solid var(--border);
  display:flex;
  justify-content:space-between;
  font-size:13px;
  font-weight:700;
}

.badge{
  display:inline-flex !important;
  align-items:center;
  justify-content:center;

  height:40px !important;
  min-width:40px !important;

  padding:0 12px !important;

  border-radius:12px !important;

  font-size:14px !important;
  font-weight:900 !important;

  line-height:40px !important;
}



.badge.red{
  background:#dcfce7;
  color:#14532d;
  border:1px solid #16a34a;
}
.badge.green{
  background:#fee2e2;
  color:#7f1d1d;
  border:1px solid #dc2626;
}

/* SCROLL */
.tableWrapper{
  max-height:320px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:1200px;
  background:#fff;
}

th, td{
  padding:8px 10px;
  border:1px solid var(--border);
  white-space:nowrap;
}

th{
  position:sticky;
  top:0;
  background:#e5e7eb;
  z-index:2;
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  color:#111827;
}

tbody tr:nth-child(even){
  background:#f8fafc;
}

tbody tr:hover{
  background:#dbeafe;
}

.badge-container {
  display: flex;
  justify-content: center; /* centraliza horizontal */
  align-items: center;     /* centraliza vertical */
  gap: 8px;                /* espaço entre badges */
  margin-top: 12px;
  flex-wrap: wrap;         /* evita quebrar layout */
}

</div>

<div id="summary" class="summary"></div>

</div>
</div>

function normalizar(txt){
  return (txt||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().trim();
}

function buscarJanelaAlmox(almoxNorm){

function excelSerialToDateLocal(serial){
  // Excel base correta: 1899-12-30
  const excelEpoch = new Date(1899, 11, 30);
  const ms = serial * 24 * 60 * 60 * 1000;
  return new Date(excelEpoch.getTime() + ms);
}



function parsePossibleDate(value){
  if(!value) return null;
  if(Object.prototype.toString.call(value)==="[object Date]") return value;
  if(typeof value==="number") return excelSerialToDateLocal(value);


  if(typeof value==="string"){
    let m=value.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m) return new Date(m[3],m[2]-1,m[1]);
    m=value.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return new Date(m[1],m[2]-1,m[3]);
    const d=new Date(value);
    if(!isNaN(d)) return d;
  }
  return null;
}

function isSameDate(d1, d2){
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth() === d2.getMonth() &&
         d1.getDate() === d2.getDate();
}


function formatDateBR(v){
  const d=parsePossibleDate(v);
  if(!d) return "";
  return d.toLocaleDateString("pt-BR");
}

async function readExcel(file){
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data,{type:"array"});
  const ws = wb.Sheets["Export"];
  return XLSX.utils.sheet_to_json(ws,{defval:""});
}

  let total = filtrado.length;
  let com = 0;
  let sem = 0;
  let totalMatches = 0;

  filtrado.forEach(r => {
    const dtCarreg = parsePossibleDate(r.dataRow["DT. CARREGAMENTO"]);

    // aplica a MESMA regra de atraso usada na tabela
    const validMatches = r.matches.filter(m => {
      const dtCheck = parsePossibleDate(m["Data de Check in"]);
      const dtEntr  = parsePossibleDate(m["Data de Entrada da Nota"]);

      let atrasado = ehAtrasado(
        r.dataRow["DT. CARREGAMENTO"],
        m["Data de Check in"],
        m["Data de Entrada da Nota"]
      );

      // se NÃO mostrar atrasados → remove do total
      if (!mostrarAtrasados && atrasado) return false;

      return true;
    });

    if (validMatches.length) com++;
    else sem++;

    totalMatches += validMatches.length;
  });

  summaryDiv.innerHTML = `
    <div class="pill">Veículos Carregados: <b>${total}</b></div>
    <div class="pill">Com Registros: <b>${com}</b></div>
    <div class="pill">Sem Registros: <b>${sem}</b></div>
    <div class="pill">Total de Notas: <b>${totalMatches}</b></div>
  `;
}



let sortState = {}; // guarda coluna e direção por grupo

function ordenarGrupo(groupIndex, col) {
  const item = resultado[groupIndex];
  if (!item) return;

  // alterna ASC/DESC
  const key = groupIndex + "_" + col;
  const dir = sortState[key] === "asc" ? "desc" : "asc";
  sortState[key] = dir;

  item.matches.sort((a, b) => {
    let va = (a[col] || "").toString().toUpperCase();
    let vb = (b[col] || "").toString().toUpperCase();

    // tenta converter datas
    const da = parsePossibleDate(a[col]);
    const db = parsePossibleDate(b[col]);
    if (da && db) return dir === "asc" ? da - db : db - da;

    // tenta número
    if (!isNaN(va) && !isNaN(vb)) return dir === "asc" ? va - vb : vb - va;

    return dir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  aplicarFiltrosEBusca(); // re-render
}

function aplicarFiltrosEBusca(){
  let f = resultado;
  const q = normalizar(searchInput.value);
  
  function isSameDate(d1, d2){
    return d1.getFullYear() === d2.getFullYear() &&
           d1.getMonth() === d2.getMonth() &&
           d1.getDate() === d2.getDate();
  }

  // Filtro por múltiplas datas de carregamento
  if (datasSelecionadas.length > 0) {

    f = f.filter(r => {
      const d = parsePossibleDate(r.dataRow["DT. CARREGAMENTO"]);
      if (!d) return false;

      return datasSelecionadas.some(selDate =>
        isSameDate(d, selDate)
      );
    });

  }



  if(filterSelect.value==="with") f=f.filter(r=>r.matches.length);
  if(filterSelect.value==="without") f=f.filter(r=>!r.matches.length);
  if(q) f=f.filter(r=>normalizar(JSON.stringify(r)).includes(q));

  // 🔹 salva o resultado filtrado global
  resultadoFiltrado = f;

  resultsDiv.innerHTML = f.map(buildGroupHTML).join("");
  renderSummary(f);
}



function processar(){

  // Pré-processa Almoxarifado do detalhado
  const detalhadoPre = detalhadoRows.map(r => ({
    ...r,
    __almoxNorm: normalizar(r["Almoxarifado"] || "")
  }));

  resultado = dataRows.map(row=>{
    const dtCarreg = parsePossibleDate(row["DT. CARREGAMENTO"]);
    const refsNorm = normalizar(row["REFERENCIAS"] || "");
    const prioridadeNorm = normalizar(row["PRIORIDADES SOLICITACAO"] || "");


    const matches = detalhadoPre.filter(r=>{
      const dtLim = parsePossibleDate(r["Dt Limite Embarque"]);

      // REGRA 1: Dt Limite <= Dt Carregamento
      if (dtLim && dtCarreg) {
        dtLim.setHours(0,0,0,0);
        dtCarreg.setHours(0,0,0,0);

        if (dtLim.getTime() > dtCarreg.getTime()) return false;
      }


      const almox = r.__almoxNorm;
      if(!almox) return false;

      // escape para regex segura
      const almoxSafe = almox.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

      // regex: não pode ter letra ou hífen colado antes/depois
      const regex = new RegExp(`(^|[^A-Z0-9])${almoxSafe}([^A-Z0-9]|$)`);


      // precisa existir em REFERENCIAS OU PRIORIDADES
      const matchRefs = regex.test(refsNorm);
      const matchPrioridade = regex.test(prioridadeNorm);

      if(!(matchRefs || matchPrioridade)) return false;



      return true;
    });
    // 🔽 ORDENA POR DT LIMITE EMBARQUE (MENOR → MAIOR)
    matches.sort((a, b) => {
      const da = parsePossibleDate(a["Dt Limite Embarque"]);
      const db = parsePossibleDate(b["Dt Limite Embarque"]);

      if (!da && !db) return 0;
      if (!da) return 1;   // datas vazias vão para o final
      if (!db) return -1;

      return da - db;
    });

    return {dataRow:row, matches};
  });

  renderSummary();
  aplicarFiltrosEBusca();
  btnExportarCSV.disabled=false;
  searchInput.disabled=false;
  filterSelect.disabled=false;
  dateFilter.disabled = false;

  document.getElementById("btnAlmoxPendentes").disabled = false;


}

// =====================================================
// REGRA PROFISSIONAL DE ATRASO (IGNORA HORÁRIO)
// =====================================================
function ehAtrasado(dataReferencia, dataCheck, dataEntrada){

  const dtRef = parsePossibleDate(dataReferencia);
  if (!dtRef) return false;

  const ref = new Date(dtRef);
  ref.setHours(0,0,0,0);

  const dtCheck = parsePossibleDate(dataCheck);
  if (dtCheck) {
    const check = new Date(dtCheck);
    check.setHours(0,0,0,0);
    if (check.getTime() >= ref.getTime()) return true;
  }

  const dtEntr = parsePossibleDate(dataEntrada);
  if (dtEntr) {
    const entr = new Date(dtEntr);
    entr.setHours(0,0,0,0);
    if (entr.getTime() >= ref.getTime()) return true;
  }

  return false;
}

function formatDateBRLocal(v){
  const d = parsePossibleDate(v);
  if(!d) return "";
  const day = d.getDate().toString().padStart(2,"0");
  const month = (d.getMonth()+1).toString().padStart(2,"0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

const ORDEM_DIAS = ["dom","seg","ter","qua","qui","sex","sab","sáb"];

function ordenarDiasSemana(arr){
  if(!Array.isArray(arr)) return [];
  
  return arr.slice().sort((a,b)=>{
    const ia = ORDEM_DIAS.indexOf(a.toLowerCase());
    const ib = ORDEM_DIAS.indexOf(b.toLowerCase());
    return ia - ib;
  });
}

// ===============================
// DIA DA SEMANA (PADRÃO JANELA)
// ===============================
function getDiaSemanaAbrev(date){
  if(!date) return null;

  const dias = ["dom","seg","ter","qua","qui","sex","sáb"];
  return dias[date.getDay()];
}

// ===============================
// VALIDA SE DATA ESTÁ NA JANELA
// ===============================
function dataCoincideComJanela(data, janelaArray){
  if(!data || !janelaArray || !janelaArray.length) return false;

  const dia = getDiaSemanaAbrev(data);
  return janelaArray.map(d => d.toLowerCase()).includes(dia);
}

function calcularProximaDataJanela(dataBase, diasJanela){

  if(!diasJanela || !diasJanela.length) return null;

  const dias = ["dom","seg","ter","qua","qui","sex","sáb"];

  const base = new Date(dataBase);
  base.setHours(0,0,0,0);

  for(let i=0; i<=14; i++){ // procura até 14 dias pra frente
    const tentativa = new Date(base);
    tentativa.setDate(base.getDate() + i);

    const diaAbrev = dias[tentativa.getDay()];

    if(diasJanela.map(d=>d.toLowerCase()).includes(diaAbrev)){
      return tentativa;
    }
  }

  return null;
}
