<script>
let dataRows = [];
let detalhadoRows = [];
let resultado = [];
let resultadoFiltrado = [];
let mostrarAtrasados = true;
let snapshotVocativos = {}; 

window.currentAnaliseReport = {
  generatedAt: "",
  filtros: {},
  stats: {},
  vocativos: [],
  clientes: [],
  notas: []
};

// ✅ cache do que veio da planilha (HOJE)
window.statusHojeServidor = window.statusHojeServidor || {}; // { VOCNORM: "PROGRAMADO" | "NAO PROGRAMADO" }
window.obsHojeServidor    = window.obsHojeServidor || {};    // { VOCNORM: "texto..." }
window._cacheHojeISO      = window._cacheHojeISO || "";      // "YYYY-MM-DD"

// guarda o que o usuário digitou (mesmo sem salvar)
window.obsDrafts = window.obsDrafts || {};  // { VOCATIVO_NORM: "texto..." }

let savingAll = false;
const savingVoc = new Set();

async function carregarObsEStatusHojeCache(force = false) {
  const hoje = hojeISO();

  // ✅ se já buscou hoje e não forçado, reaproveita
  if (!force && window._cacheHojeISO === hoje) {
    return {
      obs: window.obsHojeServidor || {},
      status: window.statusHojeServidor || {}
    };
  }

  try {
    const url = `${APPS_SCRIPT_URL}?action=obsHoje&token=${encodeURIComponent(APPS_SCRIPT_TOKEN)}&t=${Date.now()}`;
    const resp = await fetch(url, { cache: "no-store" });
    const raw = await resp.text();

    let json;
    try { json = JSON.parse(raw); }
    catch { 
      console.warn("Apps Script não retornou JSON:", raw);
      return { obs:{}, status:{} };
    }

    if (!json || !json.ok) {
      console.warn("Apps Script retornou ok=false:", json);
      return { obs:{}, status:{} };
    }

    const mapaObs = {};
    const mapaStatus = {};

    if (Array.isArray(json.data)) {
      json.data.forEach(row => {
        const voc = normalizar(row.Vocativo || row.vocativo || row.VOCATIVO || "");
        if (!voc) return;

        const obs = String(row.Observacao || row.observacao || row.OBSERVACAO || "").trim();

        const stRaw = row.StatusVeiculo || row.statusVeiculo || row.STATUSVEICULO || "";
const st = parseStatus(stRaw);

        mapaObs[voc] = obs;
        mapaStatus[voc] = st;
      });
    }

    // ✅ grava cache em memória
    window._cacheHojeISO = hoje;
    window.obsHojeServidor = mapaObs;
    window.statusHojeServidor = mapaStatus;

    return { obs: mapaObs, status: mapaStatus };

  } catch (e) {
    console.warn("Erro ao buscar obs/status hoje:", e);
    return { obs:{}, status:{} };
  }
}

function capturarStatusDoDOM(){
  window.statusDrafts = window.statusDrafts || {};
  document.querySelectorAll('select[data-status-vocativo]').forEach(sel => {
    const voc = normalizar(sel.getAttribute('data-status-vocativo') || "");
    if(!voc) return;
    window.statusDrafts[voc] = (sel.value === "PROGRAMADO") ? "PROGRAMADO" : "NAO PROGRAMADO";
  });
}

// aplica overrides (statusDrafts) no snapshot + atualiza badge + select
function reaplicarStatusDraftsNoSnapshotEUI(){
  const drafts = window.statusDrafts || {};
  Object.keys(drafts).forEach(vocNorm => {
    const st = drafts[vocNorm];

    // aplica no snapshot
    snapshotVocativos[vocNorm] = snapshotVocativos[vocNorm] || {};
    snapshotVocativos[vocNorm].StatusVeiculo = st;

    // aplica no select
    const sel = getStatusSelect(vocNorm);
    if (sel) sel.value = st;

    // aplica no badge
    const badgeDiv = document.getElementById(`statusBadge-${vocNorm}`);
    if (badgeDiv) {
      const temCarregadoHoje = (snapshotVocativos[vocNorm].TemCarregadoHoje === true);
      badgeDiv.innerHTML = renderStatusBadge(st, temCarregadoHoje);
    }
  });
}

function lockButton(btn, locked, textWhile){
  if(!btn) return;
  btn.disabled = locked;
  btn.dataset.oldText = btn.dataset.oldText || btn.innerHTML;
  if(locked && textWhile) btn.innerHTML = textWhile;
  if(!locked && btn.dataset.oldText) btn.innerHTML = btn.dataset.oldText;
}

function excelSerialToDateLocal(serial){
  // Excel base correta: 1899-12-30
  const excelEpoch = new Date(1899, 11, 30);
  const ms = serial * 24 * 60 * 60 * 1000;
  return new Date(excelEpoch.getTime() + ms);
}



function parsePossibleDate(value){
  if(!value) return null;
  if(Object.prototype.toString.call(value)==="[object Date]") return value;
  if(typeof value==="number") return excelSerialToDateLocal(value);


  if(typeof value==="string"){
    let m=value.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m) return new Date(m[3],m[2]-1,m[1]);
    m=value.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return new Date(m[1],m[2]-1,m[3]);
    const d=new Date(value);
    if(!isNaN(d)) return d;
  }
  return null;
}

function isSameDate(d1, d2){
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth() === d2.getMonth() &&
         d1.getDate() === d2.getDate();
}


function formatDateBR(v){
  const d=parsePossibleDate(v);
  if(!d) return "";
  return d.toLocaleDateString("pt-BR");
}

let sortState = {}; // guarda coluna e direção por grupo

function ordenarGrupo(groupIndex, col) {
  const item = resultado[groupIndex];
  if (!item) return;

  // alterna ASC/DESC
  const key = groupIndex + "_" + col;
  const dir = sortState[key] === "asc" ? "desc" : "asc";
  sortState[key] = dir;

  item.matches.sort((a, b) => {
    let va = (a[col] || "").toString().toUpperCase();
    let vb = (b[col] || "").toString().toUpperCase();

    // tenta converter datas
    const da = parsePossibleDate(a[col]);
    const db = parsePossibleDate(b[col]);
    if (da && db) return dir === "asc" ? da - db : db - da;

    // tenta número
    if (!isNaN(va) && !isNaN(vb)) return dir === "asc" ? va - vb : vb - va;

    return dir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  aplicarFiltrosEBusca(); // re-render
}

function aplicarFiltrosEBusca(){
  let f = resultado;
  const q = normalizar(searchInput.value);
  
  function isSameDate(d1, d2){
    return d1.getFullYear() === d2.getFullYear() &&
           d1.getMonth() === d2.getMonth() &&
           d1.getDate() === d2.getDate();
  }

  // Filtro por múltiplas datas de carregamento
  if (datasSelecionadas.length > 0) {

    f = f.filter(r => {
      const d = parsePossibleDate(r.dataRow["DT. CARREGAMENTO"]);
      if (!d) return false;

      return datasSelecionadas.some(selDate =>
        isSameDate(d, selDate)
      );
    });

  }



  if(filterSelect.value==="with") f=f.filter(r=>r.matches.length);
  if(filterSelect.value==="without") f=f.filter(r=>!r.matches.length);
  if(q) f=f.filter(r=>normalizar(JSON.stringify(r)).includes(q));

  // 🔹 salva o resultado filtrado global
  resultadoFiltrado = f;

  resultsDiv.innerHTML = f.map(buildGroupHTML).join("");
  renderSummary(f);
}



function processar(){

  // Pré-processa Almoxarifado do detalhado
  const detalhadoPre = detalhadoRows.map(r => ({
    ...r,
    __almoxNorm: normalizar(r["Almoxarifado"] || "")
  }));

  resultado = dataRows.map(row=>{
    const dtCarreg = parsePossibleDate(row["DT. CARREGAMENTO"]);
    const refsNorm = normalizar(row["REFERENCIAS"] || "");
    const prioridadeNorm = normalizar(row["PRIORIDADES SOLICITACAO"] || "");


    const matches = detalhadoPre.filter(r=>{
      const dtLim = parsePossibleDate(r["Dt Limite Embarque"]);

      // REGRA 1: Dt Limite <= Dt Carregamento
      if (dtLim && dtCarreg) {
        dtLim.setHours(0,0,0,0);
        dtCarreg.setHours(0,0,0,0);

        if (dtLim.getTime() > dtCarreg.getTime()) return false;
      }


      const almox = r.__almoxNorm;
      if(!almox) return false;

      // escape para regex segura
      const almoxSafe = almox.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

      // regex: não pode ter letra ou hífen colado antes/depois
      const regex = new RegExp(`(^|[^A-Z0-9])${almoxSafe}([^A-Z0-9]|$)`);


      // precisa existir em REFERENCIAS OU PRIORIDADES
      const matchRefs = regex.test(refsNorm);
      const matchPrioridade = regex.test(prioridadeNorm);

      if(!(matchRefs || matchPrioridade)) return false;



      return true;
    });
    // 🔽 ORDENA POR DT LIMITE EMBARQUE (MENOR → MAIOR)
    matches.sort((a, b) => {
      const da = parsePossibleDate(a["Dt Limite Embarque"]);
      const db = parsePossibleDate(b["Dt Limite Embarque"]);

      if (!da && !db) return 0;
      if (!da) return 1;   // datas vazias vão para o final
      if (!db) return -1;

      return da - db;
    });

    return {dataRow:row, matches};
  });

  renderSummary();
  aplicarFiltrosEBusca();
  btnExportarCSV.disabled=false;
  searchInput.disabled=false;
  filterSelect.disabled=false;
  dateFilter.disabled = false;

  document.getElementById("btnAlmoxPendentes").disabled = false;


}

}

// =====================================================
// REGRA PROFISSIONAL DE ATRASO (IGNORA HORÁRIO)
// =====================================================
function ehAtrasado(dataReferencia, dataCheck, dataEntrada){

  const dtRef = parsePossibleDate(dataReferencia);
  if (!dtRef) return false;

  const ref = new Date(dtRef);
  ref.setHours(0,0,0,0);

  const dtCheck = parsePossibleDate(dataCheck);
  if (dtCheck) {
    const check = new Date(dtCheck);
    check.setHours(0,0,0,0);
    if (check.getTime() >= ref.getTime()) return true;
  }

  const dtEntr = parsePossibleDate(dataEntrada);
  if (dtEntr) {
    const entr = new Date(dtEntr);
    entr.setHours(0,0,0,0);
    if (entr.getTime() >= ref.getTime()) return true;
  }

  return false;
}

function formatDateBRLocal(v){
  const d = parsePossibleDate(v);
  if(!d) return "";
  const day = d.getDate().toString().padStart(2,"0");
  const month = (d.getMonth()+1).toString().padStart(2,"0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

const ORDEM_DIAS = ["dom","seg","ter","qua","qui","sex","sab","sáb"];

function ordenarDiasSemana(arr){
  if(!Array.isArray(arr)) return [];
  
  return arr.slice().sort((a,b)=>{
    const ia = ORDEM_DIAS.indexOf(a.toLowerCase());
    const ib = ORDEM_DIAS.indexOf(b.toLowerCase());
    return ia - ib;
  });
}

function getDiaSemanaAbrev(date){
  if(!date) return null;

  const dias = ["dom","seg","ter","qua","qui","sex","sáb"];
  return dias[date.getDay()];
}

// ===============================
// VALIDA SE DATA ESTÁ NA JANELA
// ===============================
function dataCoincideComJanela(data, janelaArray){
  if(!data || !janelaArray || !janelaArray.length) return false;

  const dia = getDiaSemanaAbrev(data);
  return janelaArray.map(d => d.toLowerCase()).includes(dia);
}

function calcularProximaDataJanela(dataBase, diasJanela){

  if(!diasJanela || !diasJanela.length) return null;

  const dias = ["dom","seg","ter","qua","qui","sex","sáb"];

  const base = new Date(dataBase);
  base.setHours(0,0,0,0);

  for(let i=0; i<=14; i++){ // procura até 14 dias pra frente
    const tentativa = new Date(base);
    tentativa.setDate(base.getDate() + i);

    const diaAbrev = dias[tentativa.getDay()];

    if(diasJanela.map(d=>d.toLowerCase()).includes(diaAbrev)){
      return tentativa;
    }
  }

  return null;
}

function getObsTextarea(vocNorm){
  return document.querySelector(`textarea[data-vocativo="${vocNorm}"]`);
}

// adiciona texto no textarea (SEM salvar)
function addObsPreset(ev, vocNorm, texto){
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }

  const t = getObsTextarea(vocNorm);
  if (!t) return;

  const add = String(texto || "").trim();
  if (!add) return;

  const atual = (t.value || "").trim();
  t.value = atual ? (atual + "\n" + add) : add;

  t.focus();
  t.selectionStart = t.selectionEnd = t.value.length;
  t.dispatchEvent(new Event("input", { bubbles:true }));
}

// limpar (opcional)
function clearObs(ev, vocNorm){
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
  const t = getObsTextarea(vocNorm);
  if (!t) return;
  t.value = "";
  t.focus();
  t.dispatchEvent(new Event("input", { bubbles:true }));
}

function toDateOnly(d){
  const x = parsePossibleDate(d);
  if(!x) return null;
  const y = new Date(x);
  y.setHours(0,0,0,0);
  return y;
}

// dias inteiros (0 = hoje, 1 = ontem, 6 = 6 dias atrás)
function diasDesdeHoje(data){
  const d = toDateOnly(data);
  if(!d) return null;
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  return Math.floor((hoje.getTime() - d.getTime()) / 86400000);
}

// pega a maior entre Check-in e Entrada (date-only)
function maiorDataEntradaOuCheckin(dtCheck, dtEntr){
  const c = toDateOnly(dtCheck);
  const e = toDateOnly(dtEntr);
  if(c && e) return (c > e) ? c : e;
  return c || e || null;
}

function formatDateTimeBRLocal(v){
  const d = parsePossibleDate(v);
  if(!d) return "";

  return d.toLocaleString("pt-BR", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function hojeISO(){
  const d = new Date();
  // força data local sem sofrer offset na hora de formatar
  const local = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const y = local.getFullYear();
  const m = String(local.getMonth()+1).padStart(2,"0");
  const day = String(local.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

async function carregarObservacoesHojeEPreencher() {

    let json;

    try {
      json = JSON.parse(raw);
    } catch (e) {
      console.warn("Resposta do Apps Script não é JSON válido:", raw);
      return;
    }

    if (!json || !json.ok) {
      console.warn("Apps Script retornou ok=false:", json);
      return;
    }

    // Aceita data como objeto {VOC: "obs"} OU como array [{Vocativo, Observacao}, ...]
    const mapa = {};
    const mapaStatus = {};

    if (Array.isArray(json.data)) {
      json.data.forEach(row => {
        const voc = normalizar(row.Vocativo || row.vocativo || row.VOCATIVO || "");
        const obs = String(row.Observacao || row.observacao || row.OBSERVACAO || "").trim();

        const stRaw = row.StatusVeiculo || row.statusVeiculo || row.STATUSVEICULO || "";
const st = parseStatus(stRaw);

        if (voc) {
          mapa[voc] = obs;
          mapaStatus[voc] = st;
        }
      });
    }

    // guarda original (hoje)
    window.obsHojeOriginal = { ...mapa };

    // aplica
    aplicarObservacoesNoDOM(mapa);
    aplicarStatusNoDOM(mapaStatus);

  } catch (e) {
    console.warn("Erro ao carregar observações do dia:", e);
  }
}

function getStatusSelect(vocNorm){
  return document.querySelector(`select[data-status-vocativo="${vocNorm}"]`);
}

function renderStatusBadge(status, temCarregadoHoje){
  // mantém sua regra visual: carregado hoje pode coexistir
  let html = "";

  if (temCarregadoHoje) {
    html += `
      <span style="
        background:#dbeafe; color:#1e3a8a; border:2px solid #2563eb;
        padding:6px 12px; border-radius:999px; font-size:12px; font-weight:900; margin-right:6px;
      ">🔵 CARREGADO HOJE</span>
    `;
  }

  if (status === "PROGRAMADO") {
    html += `
      <span style="
        background:#dcfce7; color:#14532d; border:2px solid #22c55e;
        padding:6px 12px; border-radius:999px; font-size:12px; font-weight:900;
      ">🟢 PROGRAMADO</span>
    `;
  } else {
    html += `
      <span style="
        background:#fee2e2; color:#7f1d1d; border:2px solid #ef4444;
        padding:6px 12px; border-radius:999px; font-size:12px; font-weight:900;
      ">🔴 NÃO PROGRAMADO</span>
    `;
  }

  return html;
}

// quando usuário muda no select
function onStatusManualChange(vocNorm, value, ev){
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }

  const status = (value === "PROGRAMADO") ? "PROGRAMADO" : "NAO PROGRAMADO";

  // cache local
  window.statusDrafts = window.statusDrafts || {};
  window.statusDrafts[vocNorm] = status;

  // garante que snapshot esteja coerente (isso que vai para planilha)
  snapshotVocativos[vocNorm] = snapshotVocativos[vocNorm] || {};
  snapshotVocativos[vocNorm].StatusVeiculo = status;

  // atualiza badge na hora
  const badgeDiv = document.getElementById(`statusBadge-${vocNorm}`);
  if (badgeDiv) {
    const temCarregadoHoje = (snapshotVocativos[vocNorm].TemCarregadoHoje === true);
    badgeDiv.innerHTML = renderStatusBadge(status, temCarregadoHoje);
  }
  listarAlmoxPendentes();
}

// aplica os status carregados do servidor (sem sobrescrever se usuário já mexeu manualmente)
function aplicarStatusNoDOM(mapaStatus){
  Object.keys(mapaStatus || {}).forEach(voc => {
    const vocNorm = normalizar(voc);
    const statusServidor = parseStatus(mapaStatus[voc]);

    // se usuário já alterou manualmente, não sobrescreve
    if (window.statusDrafts && window.statusDrafts[vocNorm]) return;

    // status atual calculado (snapshot já tem o default calculado na montagem)
    const statusAtualCalculado = snapshotVocativos?.[vocNorm]?.StatusVeiculo || "NAO PROGRAMADO";

    // ✅ regra nova:
    // - se servidor = PROGRAMADO -> aplica sempre
    // - se servidor = NAO PROGRAMADO -> só aplica se o calculado NÃO for PROGRAMADO
    if (statusServidor === "NAO PROGRAMADO" && statusAtualCalculado === "PROGRAMADO") {
      return; // 🔒 não derruba PROGRAMADO calculado
    }

    const sel = getStatusSelect(vocNorm);
    if (sel) sel.value = statusServidor;

    snapshotVocativos[vocNorm] = snapshotVocativos[vocNorm] || {};
    snapshotVocativos[vocNorm].StatusVeiculo = statusServidor;

    // atualiza badge
    const badgeDiv = document.getElementById(`statusBadge-${vocNorm}`);
    if (badgeDiv) {
      const temCarregadoHoje = (snapshotVocativos[vocNorm].TemCarregadoHoje === true);
      badgeDiv.innerHTML = renderStatusBadge(statusServidor, temCarregadoHoje);
    }
  });
}

function aplicarObservacoesNoDOM(mapa) {
  Object.keys(mapa || {}).forEach(voc => {
    const vocNorm = normalizar(voc);
    const texto = String(mapa[voc] || "").trim();

    const t = document.querySelector(`textarea[data-vocativo="${vocNorm}"]`);
    if (!t) return;

    // ✅ se o usuário já digitou algo (draft), não sobrescreve
    if (window.obsDrafts && window.obsDrafts[vocNorm] != null && (window.obsDrafts[vocNorm] || "").trim() !== "") {
      return;
    }

    t.value = texto;

    // também alimenta o draft com o que veio do servidor
    window.obsDrafts = window.obsDrafts || {};
    window.obsDrafts[vocNorm] = texto;
  });
}

// ✅ Impede que teclado/clique dentro do textarea acione abrir/fechar o <details>
// ✅ Espaço NÃO abre o dropdown, mas continua digitando normalmente no textarea
document.addEventListener("keydown", (e) => {
  const t = e.target;
  if (!t || !t.matches('textarea[data-vocativo]')) return;

  if (e.key === " " || e.code === "Space" || e.keyCode === 32) {

    // impede o toggle do <details>
    e.preventDefault();
    e.stopPropagation();

    // insere o espaço manualmente no ponto do cursor
    const start = t.selectionStart ?? t.value.length;
    const end   = t.selectionEnd ?? t.value.length;

    t.value = t.value.slice(0, start) + " " + t.value.slice(end);

    const pos = start + 1;
    t.setSelectionRange(pos, pos);

    // dispara evento input normal
    t.dispatchEvent(new Event("input", { bubbles: true }));
  }
}, true);


// clique dentro do textarea não abre/fecha o dropdown
document.addEventListener("click", (e) => {
  const t = e.target;
  if (t && t.matches('textarea[data-vocativo]')) {
    e.stopPropagation();
  }
}, true);

function capturarObsDoDOM(){
  const map = window.obsDrafts || (window.obsDrafts = {});
  document.querySelectorAll('textarea[data-vocativo]').forEach(t => {
    const voc = normalizar(t.dataset.vocativo || "");
    if(!voc) return;
    map[voc] = t.value || "";
  });
}

function restaurarObsNoDOM(){
  const map = window.obsDrafts || {};
  document.querySelectorAll('textarea[data-vocativo]').forEach(t => {
    const voc = normalizar(t.dataset.vocativo || "");
    if(!voc) return;

    // só preenche se houver draft
    if (map[voc] != null) t.value = map[voc];
  });
}

// opcional (melhor UX): enquanto digita, já atualiza o cache
document.addEventListener("input", (e) => {
  const t = e.target;
  if (!t || !t.matches('textarea[data-vocativo]')) return;
  const voc = normalizar(t.dataset.vocativo || "");
  if (!voc) return;

}, true);


/* ===============================
   ✅ Gráficos (UI ONLY)
   - Não altera regras/funcionalidade
   - Apenas reflete os totais já calculados

let _chartResumoPrincipal = null;
let _chartKpiVolume = null;
let _chartKpiEntrada = null;
let _chartKpiStatus = null;
let _chartKpiCriticidade = null;

function _fmt(n){
  const x = Number(n || 0);
  return x.toLocaleString("pt-BR");
}

function _pct(value, dataArray){
  const total = (dataArray || []).reduce((a,b)=> a + (Number(b)||0), 0);
  if (!total) return "";
  const p = (Number(value || 0) / total) * 100;
  return p.toLocaleString("pt-BR", { maximumFractionDigits: 1 }) + "%";
}

function _destroyChart(ch){
  try{ if(ch) ch.destroy(); } catch(e){}
}

function _mkBarChart(ctx, labels, values){
  return new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "",
        data: values
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,

      layout: {
        padding: { top: 18 } // 👈 dá “respiro” pro rótulo não ser cortado
      },

      plugins: {
        legend: { display: false },
        tooltip: { enabled: true },
        datalabels: {
          anchor: "end",
          align: "top",
          offset: 4,      // 👈 empurra um pouco pra cima
          clamp: true,    // 👈 mantém dentro do chartArea
          clip: false,    // 👈 evita cortar o label
          formatter: (v, ctx) => {
            const arr = ctx?.chart?.data?.datasets?.[0]?.data || [];
            return v ? _pct(v, arr) : "";
          },
          font: { weight: "900", size: 11 }
        }
      },
      scales: {
        x: { ticks: { font: { size: 10 } }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { font: { size: 10 } } }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function _mkDoughnutChart(ctx, labels, values){
  return new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: values,
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "68%",
      plugins: {
        legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 10 } } },
        tooltip: { enabled: true },
        datalabels: {
          formatter: (v, ctx) => {
            const arr = ctx?.chart?.data?.datasets?.[0]?.data || [];
            return v ? _pct(v, arr) : "";
          },
          font: { weight: "900", size: 11 }
        }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function atualizarGraficoResumoPrincipal({ total, com, sem, totalMatches }){
  const canvas = document.getElementById("chartResumoPrincipal");
  if (!canvas || !window.Chart) return;

  const ctx = canvas.getContext("2d");

  _destroyChart(_chartResumoPrincipal);
  _chartResumoPrincipal = _mkBarChart(

    ["Veículos", "Com Reg.", "Sem Reg.", "Notas"],
    [total, com, sem, totalMatches]
  );
}

// Análise: 4 blocos
function atualizarGraficosAnalise(stats){
  if (!stats || !window.Chart) return;

  // volume (somente Notas Programadas x Não Programadas)
  const c1 = document.getElementById("chartKpiVolume");
  if (c1) {
    _destroyChart(_chartKpiVolume);
    _chartKpiVolume = _mkBarChart(
      c1.getContext("2d"),
      ["Notas Programadas", "Notas Não Programadas"],
      [stats.notasProgramadas, stats.notasNaoProgramadas]
    );
  }

  // entrada
  const c2 = document.getElementById("chartKpiEntrada");
  if (c2) {
    _destroyChart(_chartKpiEntrada);
    _chartKpiEntrada = _mkDoughnutChart(
      c2.getContext("2d"),
      ["No prazo", "Em atraso"],
      [stats.totalPrazo, stats.totalAtraso]
    );
  }

  // status (100%: Programados x Não Programados) — remove "Carregados Hoje" do gráfico
  const c3 = document.getElementById("chartKpiStatus");
  if (c3) {
    _destroyChart(_chartKpiStatus);
    _chartKpiStatus = _mkDoughnutChart(
      c3.getContext("2d"),
      ["Programados", "Não Programados"],
      [stats.programados, stats.semVeiculo]
    );
  }

  // criticidade
  const c4 = document.getElementById("chartKpiCriticidade");
  if (c4) {
    _destroyChart(_chartKpiCriticidade);
    _chartKpiCriticidade = _mkBarChart(
      c4.getContext("2d"),
      ["Vencidas", "D0", "D-1", "≥ D-2"],
      [stats.totalDmais, stats.totalD0, stats.totalDmenos1, stats.totalDmenosMaiorIgual2]
    );
  }
}

function getAnaliseReportData() {
  const report = window.currentAnaliseReport || {};
  if (!report.vocativos || !report.vocativos.length) {
    alert("Abra a tela 'Análise Programação' com dados carregados antes de gerar o relatório.");
    return null;
  }
  return report;
}

function autoWidthFromJson(rows) {
  if (!rows || !rows.length) return [];
  const keys = Object.keys(rows[0]);
  return keys.map(k => {
    const maxLen = Math.max(
      k.length,
      ...rows.map(r => String(r[k] ?? "").length)
    );
    return { wch: Math.min(Math.max(maxLen + 2, 12), 40) };
  });
}
